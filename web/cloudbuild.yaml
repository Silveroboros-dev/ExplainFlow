steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/explainflow-web', 
      '-f', 'web/Dockerfile', 
      '--build-arg', 'NEXT_PUBLIC_API_URL=https://explainflow-api-745130520479.us-central1.run.app',
      '.'
    ]

# 2. Push the image to GCR
images:
  - 'gcr.io/$PROJECT_ID/explainflow-web'
