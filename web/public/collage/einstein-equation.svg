<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1324"/>
      <stop offset="1" stop-color="#1A2641"/>
    </linearGradient>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#9BB6E8" stroke-width="1">
    <path d="M80 120H1120"/>
    <path d="M80 220H1120"/>
    <path d="M80 320H1120"/>
    <path d="M80 420H1120"/>
    <path d="M80 520H1120"/>
    <path d="M80 620H1120"/>
  </g>
  <text x="160" y="455" fill="#F4F7FF" font-size="220" font-family="Times New Roman, Georgia, serif" filter="url(#chalk)">E = mc²</text>
  <text x="165" y="525" fill="#B6CAEF" opacity="0.65" font-size="44" font-family="Inter, Arial, sans-serif" letter-spacing="0.08em">ENERGY  MASS  LIGHT-SPEED²</text>
</svg>
